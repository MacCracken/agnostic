# Production overrides — nginx proxy, all workers enabled, auth, logging.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile workers up -d
# Add monitoring: ... -f docker-compose.monitoring.yml
# Add logging:    ... -f docker-compose.logging.yml

services:
  # --- Reverse proxy --------------------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - qa-network
    depends_on:
      - webgui
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Infrastructure tuning ------------------------------------------------
  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}

  rabbitmq:
    environment:
      RABBITMQ_DEFAULT_VHOST: qa-vhost

  # --- WebGUI (prod settings) -----------------------------------------------
  webgui:
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      WEBGUI_HOST: "0.0.0.0"
      WEBGUI_PORT: "8000"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agnostic}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agnostic}
      DATABASE_ENABLED: ${DATABASE_ENABLED:-true}
      ENVIRONMENT: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENABLE_AUTHENTICATION: "true"
      ENABLE_RATE_LIMITING: "true"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}

  # --- Worker overrides (prod env vars) -------------------------------------
  qa-manager:
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      AGENT_ROLE: manager
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENVIRONMENT: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

  senior-qa:
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      AGENT_ROLE: senior
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENVIRONMENT: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

  junior-qa:
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      AGENT_ROLE: junior
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENVIRONMENT: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

  qa-analyst:
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      AGENT_ROLE: analyst
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENVIRONMENT: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

  security-compliance-agent:
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      AGENT_ROLE: security_compliance
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENVIRONMENT: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

  performance-agent:
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
