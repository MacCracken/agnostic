name: CI/CD Pipeline
on:
  push:
    branches: [main, develop]
    tags: ['v*', '20[0-9][0-9].[0-9]*']
  pull_request:
    branches: [main, develop]

env:
  DOCKER_BUILDKIT: 1
  TZ: UTC

jobs:
  # Code Quality Checks
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Setup environment
        uses: ./.github/actions/setup-python-env
        with:
          extras: 'dev'

      - name: Ruff lint
        run: ruff check agents/ config/ shared/ webgui/ --output-format=github

      - name: Ruff format
        run: ruff format --check agents/ config/ shared/ webgui/

      - name: Mypy type check
        run: mypy agents/ config/ shared/ --ignore-missing-imports || true

  # Security Scanning
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Setup environment
        uses: ./.github/actions/setup-python-env
        with:
          extras: ''

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          output: 'sarif'
          output-file: 'trivy-results.sarif'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Bandit Security Code Scan
  security-code-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Setup environment
        uses: ./.github/actions/setup-python-env
        with:
          extras: ''

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit (JSON report)
        run: bandit -r agents/ config/ shared/ webgui/ -f json -o bandit-report.json || true

      - name: Run Bandit (enforce zero medium/high)
        run: bandit -r agents/ config/ shared/ webgui/ -ll

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # Unit Tests
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Setup environment
        uses: ./.github/actions/setup-python-env
        with:
          extras: 'dev,test,web'

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=agents --cov=config --cov=shared --cov=webgui --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests

  # Integration Tests
  integration-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Setup environment
        uses: ./.github/actions/setup-python-env
        with:
          extras: 'dev,test,web'

      - name: Start test services
        run: |
          docker compose -f docker-compose.test.yml up -d redis-test rabbitmq-test
          sleep 10

      - name: Run integration tests
        env:
          REDIS_HOST: localhost
          RABBITMQ_HOST: localhost
          LOG_LEVEL: DEBUG
        run: python run_tests.py --mode integration --env docker

      - name: Teardown test services
        if: always()
        run: docker compose -f docker-compose.test.yml down -v || true

  # End-to-End Tests
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Setup environment
        id: setup
        uses: ./.github/actions/setup-python-env
        with:
          extras: 'dev,test,web'

      - name: Build and start full stack
        run: |
          ./scripts/build-docker.sh --base-only
          docker compose up -d
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-placeholder' }}
          POSTGRES_PASSWORD: test_password
          AGNOSTIC_API_KEY: test-e2e-key

      - name: Wait for health endpoint
        run: |
          echo "Waiting for health endpoint (max 120s) ..."
          elapsed=0
          while [ "$elapsed" -lt 120 ]; do
            if curl -sf http://localhost:8000/health >/dev/null 2>&1; then
              echo "Health endpoint ready after ${elapsed}s."
              break
            fi
            sleep 5
            elapsed=$((elapsed + 5))
          done
          if [ "$elapsed" -ge 120 ]; then
            echo "Health endpoint not ready -- dumping logs"
            docker compose logs --tail=50
            exit 1
          fi

      - name: Run E2E tests
        env:
          E2E_BASE_URL: http://localhost:8000
          E2E_API_KEY: test-e2e-key
        run: pytest tests/e2e/ -v -m e2e

      - name: Teardown services
        if: always()
        run: docker compose -f docker-compose.yml down -v || true

  # Helm Chart Lint
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Setup environment
        uses: ./.github/actions/setup-python-env
        with:
          extras: ''

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint k8s/helm/agentic-qa/

      - name: Template Helm chart
        run: helm template agentic-qa k8s/helm/agentic-qa/ --debug

  # Build Release Artifacts + Container
  build-release:
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, security-code-scan, helm-lint]
    steps:
      - name: Setup environment
        id: setup
        uses: ./.github/actions/setup-python-env
        with:
          extras: ''

      - name: Install build tools
        run: pip install build

      - name: Build release artifacts
        run: |
          PYTHON=$(which python) ./scripts/build-release.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/agnostic_qa_*

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "registry=ghcr.io/${REPO_OWNER}" >> "$GITHUB_OUTPUT"
          VERSION="${{ steps.setup.outputs.project-version }}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # v2026.3.7 -> 2026.3.7
            echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/20* ]]; then
            # 2026.3.7 (bare calver tag)
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build containers
        run: |
          ./scripts/build-docker.sh --base-only
          ./scripts/build-docker.sh --agents-only
        env:
          OPENAI_API_KEY: sk-test-placeholder
          POSTGRES_PASSWORD: ci_password
          RABBITMQ_USER: qa_user
          RABBITMQ_PASSWORD: ci_password

      - name: Test container health
        run: |
          docker compose up -d redis postgres
          sleep 10
          docker compose exec -T redis redis-cli ping
          docker compose exec -T postgres pg_isready -U agnostic
          docker compose down
        env:
          OPENAI_API_KEY: sk-test-placeholder
          POSTGRES_PASSWORD: ci_password

      - name: Tag and push to GHCR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        run: |
          REGISTRY="${{ steps.meta.outputs.registry }}"
          TAG="${{ steps.meta.outputs.tag }}"
          for image in agent webgui; do
            docker tag "agnostic-${image}:latest" "${REGISTRY}/agnostic-${image}:${TAG}"
            docker push "${REGISTRY}/agnostic-${image}:${TAG}"
          done

  # Create GitHub Release (tags only)
  release:
    runs-on: ubuntu-latest
    needs: [build-release, integration-tests, e2e-tests, security-scan]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Setup environment
        id: setup
        uses: ./.github/actions/setup-python-env
        with:
          extras: ''

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist/

      - name: Extract tag version
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Normalize: strip leading 'v' if present
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          cat > release-notes.md << 'NOTES_EOF'
          ## Agnostic QA Platform ${{ steps.tag.outputs.version }}

          ### Container Images

          Pull from GHCR:
          ```bash
          REGISTRY=ghcr.io/${{ github.repository_owner }}
          docker pull "${REGISTRY}/agnostic-agent:${{ steps.tag.outputs.version }}"
          docker pull "${REGISTRY}/agnostic-webgui:${{ steps.tag.outputs.version }}"
          ```

          ### Quick Start

          ```bash
          cp .env.example .env
          ./scripts/build-docker.sh
          docker compose up -d
          ```

          ### Changelog

          See [docs/project/changelog.md](https://github.com/${{ github.repository }}/blob/${{ steps.tag.outputs.tag }}/docs/project/changelog.md) for full details.
          NOTES_EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.version }}
          body_path: release-notes.md
          files: dist/agnostic_qa_*
          generate_release_notes: true
          make_latest: true
