name: CI/CD Pipeline for QA System 2026.3.6
on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'
  DOCKER_BUILDKIT: 1
  TZ: UTC

jobs:
  # Code Quality Checks
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check agents/ config/ shared/ webgui/ --output-format=github

      - name: Ruff format
        run: ruff format --check agents/ config/ shared/ webgui/

      - name: Mypy type check
        run: mypy agents/ config/ shared/ --ignore-missing-imports || true

  # Security Scanning
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          output: 'sarif'
          output-file: 'trivy-results.sarif'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Bandit Security Code Scan
  security-code-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit (JSON report)
        run: bandit -r agents/ config/ shared/ webgui/ -f json -o bandit-report.json || true

      - name: Run Bandit (enforce zero medium/high)
        run: bandit -r agents/ config/ shared/ webgui/ -ll

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # Unit Tests
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev,test,web]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=agents --cov=config --cov=shared --cov=webgui --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests

  # Integration Tests
  integration-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev,test,web]"

      - name: Start test services
        run: |
          docker compose -f docker-compose.test.yml up -d redis-test rabbitmq-test
          sleep 10

      - name: Run integration tests
        env:
          REDIS_HOST: localhost
          RABBITMQ_HOST: localhost
          LOG_LEVEL: DEBUG
        run: python run_tests.py --mode integration --env docker

      - name: Teardown test services
        if: always()
        run: docker compose -f docker-compose.test.yml down -v || true

  # End-to-End Tests
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev,test,web]"

      - name: Build and start full stack
        run: |
          docker compose -f docker-compose.yml build
          docker compose -f docker-compose.yml up -d
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-placeholder' }}
          RABBITMQ_USER: qa_user
          RABBITMQ_PASSWORD: test_password
          AGNOSTIC_API_KEY: test-e2e-key

      - name: Wait for health endpoint
        run: |
          echo "Waiting for health endpoint (max 120s) ..."
          elapsed=0
          while [ "$elapsed" -lt 120 ]; do
            if curl -sf http://localhost:8000/health >/dev/null 2>&1; then
              echo "Health endpoint ready after ${elapsed}s."
              break
            fi
            sleep 5
            elapsed=$((elapsed + 5))
          done
          if [ "$elapsed" -ge 120 ]; then
            echo "Health endpoint not ready -- dumping logs"
            docker compose logs --tail=50
            exit 1
          fi

      - name: Run E2E tests
        env:
          E2E_BASE_URL: http://localhost:8000
          E2E_API_KEY: test-e2e-key
        run: pytest tests/e2e/ -v -m e2e

      - name: Teardown services
        if: always()
        run: docker compose -f docker-compose.yml down -v || true

  # Helm Chart Lint
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint k8s/helm/agentic-qa/

      - name: Template Helm chart
        run: helm template agentic-qa k8s/helm/agentic-qa/ --debug

  # Build Release Artifacts + Container
  build-release:
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, security-code-scan, helm-lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install build tools
        run: pip install build

      - name: Build release artifacts
        run: |
          PYTHON=$(which python) ./scripts/build-release.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/agnostic_qa_*

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build containers
        run: docker compose -f docker-compose.yml build
        env:
          OPENAI_API_KEY: sk-test-placeholder
          RABBITMQ_USER: qa_user
          RABBITMQ_PASSWORD: ci_password

      - name: Test container health
        run: |
          docker compose -f docker-compose.yml up -d redis rabbitmq
          sleep 10
          docker compose exec -T redis redis-cli ping
          docker compose exec -T rabbitmq rabbitmq-diagnostics ping
          docker compose -f docker-compose.yml down
        env:
          OPENAI_API_KEY: sk-test-placeholder
          RABBITMQ_USER: qa_user
          RABBITMQ_PASSWORD: ci_password
