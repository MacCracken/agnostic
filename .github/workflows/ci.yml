name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TZ: UTC

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          extras: 'dev'
      - name: Ruff lint
        run: ruff check agents/ config/ shared/ webgui/ --output-format=github
      - name: Ruff format
        run: ruff format --check agents/ config/ shared/ webgui/
      - name: Mypy type check
        run: mypy agents/ config/ shared/ --ignore-missing-imports || true

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'
          ignore-unfixed: true
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  security-code-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          extras: ''
      - run: pip install bandit[toml]
      - name: Bandit (JSON report)
        run: bandit -r agents/ config/ shared/ webgui/ -f json -o bandit-report.json || true
      - name: Bandit (enforce zero medium/high)
        run: bandit -r agents/ config/ shared/ webgui/ -ll
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          extras: 'dev,test,web,database'
      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=agents --cov=config --cov=shared --cov=webgui --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests

  integration-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          extras: 'dev,test,web,database'
      - name: Start test services
        run: |
          docker compose -f docker-compose.test.yml up -d redis-test rabbitmq-test
          sleep 10
      - name: Run integration tests
        env:
          REDIS_HOST: localhost
          REDIS_PORT: "6380"
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: "5673"
          RABBITMQ_USER: test_user
          RABBITMQ_PASSWORD: test_password
          LOG_LEVEL: DEBUG
        run: python run_tests.py --mode integration --env docker
      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.test.yml down -v || true

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          extras: 'dev,test,web,database'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker
      - name: Build image
        run: ./scripts/build-docker.sh
      - name: Start services
        run: |
          docker compose --profile dev up -d
          echo "Waiting for services to be healthy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Services healthy after ${i}s"
              break
            fi
            sleep 1
          done
        env:
          AGNOSTIC_API_KEY: test-e2e-key
          REDIS_URL: redis://redis:6379/0
          DATABASE_URL: postgresql+asyncpg://agnostic:test_password@postgres:5432/agnostic
          POSTGRES_PASSWORD: test_password
          AGNOS_LLM_GATEWAY_ENABLED: "false"
          AGNOS_AGENT_REGISTRATION_ENABLED: "false"
          AGNOS_AUDIT_ENABLED: "false"
          AGNOS_DASHBOARD_BRIDGE_ENABLED: "false"
          AGNOS_REASONING_ENABLED: "false"
          AGNOS_TOKEN_BUDGET_ENABLED: "false"
      - name: Run E2E tests
        env:
          E2E_BASE_URL: http://localhost:8000
          E2E_API_KEY: test-e2e-key
        run: pytest tests/e2e/ -v -m e2e --tb=short
      - name: Teardown
        if: always()
        env:
          POSTGRES_PASSWORD: test_password
        run: |
          docker compose --profile dev logs --tail=50
          docker compose --profile dev down -v || true
          docker compose -f docker-compose.old-style.yml down -v || true

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          extras: ''
      - uses: azure/setup-helm@v4
      - run: helm lint k8s/helm/agentic-qa/
      - run: helm template agentic-qa k8s/helm/agentic-qa/ --debug
