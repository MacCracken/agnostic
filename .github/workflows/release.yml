name: Release
on:
  push:
    tags: ['20[0-9][0-9].[0-9]*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 2026.3.8-1)'
        required: true

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  security-events: write

env:
  DOCKER_BUILDKIT: 1
  TZ: UTC

jobs:
  # Run all CI checks before releasing
  ci-gate:
    uses: ./.github/workflows/ci.yml

  # Build + push image + create release
  release:
    runs-on: ubuntu-latest
    needs: [ci-gate]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        id: setup
        uses: ./.github/actions/setup-python-env
        with:
          extras: ''

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build release artifacts
        run: |
          pip install build
          PYTHON=$(which python) ./scripts/build-release.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/agnostic_qa_*

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build image
        run: ./scripts/build-docker.sh

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REGISTRY="ghcr.io/${REPO_OWNER}"
          VERSION="${{ steps.version.outputs.version }}"
          docker tag "agnostic:latest" "${REGISTRY}/agnostic:${VERSION}"
          docker tag "agnostic:latest" "${REGISTRY}/agnostic:latest"
          docker push "${REGISTRY}/agnostic:${VERSION}"
          docker push "${REGISTRY}/agnostic:latest"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          files: dist/agnostic_qa_*
          generate_release_notes: true
          make_latest: true
