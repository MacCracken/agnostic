<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Clipboard body -->
  <rect x="10" y="8" width="44" height="52" rx="4" ry="4" fill="#2563eb" />
  <!-- Clipboard clip -->
  <rect x="22" y="4" width="20" height="10" rx="3" ry="3" fill="#1e40af" />
  <rect x="28" y="2" width="8" height="6" rx="2" ry="2" fill="#93c5fd" />
  <!-- Clipboard face / paper area -->
  <rect x="14" y="16" width="36" height="40" rx="2" ry="2" fill="#eff6ff" />
  <!-- Checkmark -->
  <polyline points="22,38 29,46 42,30" fill="none" stroke="#16a34a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
  <!-- List lines -->
  <line x1="20" y1="22" x2="44" y2="22" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round" />
  <line x1="20" y1="27" x2="38" y2="27" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round" />
</svg>
