# Agnostic QA Platform
#
# Production (on AGNOS): embedded Redis + PostgreSQL inside the container.
#
#   docker compose up -d
#
# Production with external HA services:
#
#   REDIS_URL=redis://my-redis-cluster:6379/0 \
#   DATABASE_URL=postgresql+asyncpg://user:pass@my-pg:5432/agnostic \
#   docker compose up -d
#
# Standalone with TLS (provided certs):
#
#   TLS_ENABLED=true TLS_CERT_PATH=/certs/cert.pem TLS_KEY_PATH=/certs/key.pem \
#   docker compose up -d
#
# Standalone with auto-HTTPS (public domain):
#
#   TLS_ENABLED=true TLS_DOMAIN=qa.example.com docker compose up -d
#
# Dev: spin up redis + postgres as separate containers.
#
#   docker compose --profile dev up -d

services:
  agnostic:
    image: agnostic:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      - "${TLS_HTTPS_PORT:-443}:443"
      - "${TLS_HTTP_PORT:-80}:80"
    environment:
      # Embedded services: leave defaults for built-in Redis/Postgres.
      # Set external URLs to skip embedded and use HA infrastructure.
      REDIS_URL: ${REDIS_URL:-redis://127.0.0.1:6379/0}
      DATABASE_URL: ${DATABASE_URL:-}
      DATABASE_ENABLED: ${DATABASE_ENABLED:-true}
      POSTGRES_USER: ${POSTGRES_USER:-agnostic}
      POSTGRES_DB: ${POSTGRES_DB:-agnostic}
      # TLS — set TLS_ENABLED=true for standalone HTTPS.
      # Provide certs (TLS_CERT_PATH + TLS_KEY_PATH) or a domain (TLS_DOMAIN) for auto-HTTPS.
      TLS_ENABLED: ${TLS_ENABLED:-false}
      TLS_CERT_PATH: ${TLS_CERT_PATH:-}
      TLS_KEY_PATH: ${TLS_KEY_PATH:-}
      TLS_DOMAIN: ${TLS_DOMAIN:-}
      AGNOSTIC_API_KEY: ${AGNOSTIC_API_KEY:-}
      YEOMAN_A2A_ENABLED: ${YEOMAN_A2A_ENABLED:-true}
      MCP_SERVER_ENABLED: ${MCP_SERVER_ENABLED:-true}
      WEBGUI_HOST: "0.0.0.0"
      WEBGUI_PORT: "8000"
      # LLM Gateway (hoosh) — AGNOS system service
      AGNOS_LLM_GATEWAY_ENABLED: ${AGNOS_LLM_GATEWAY_ENABLED:-true}
      AGNOS_LLM_GATEWAY_URL: ${AGNOS_LLM_GATEWAY_URL:-http://localhost:8088}
      AGNOS_LLM_GATEWAY_MODEL: ${AGNOS_LLM_GATEWAY_MODEL:-default}
      AGNOS_LLM_GATEWAY_API_KEY: ${AGNOS_LLM_GATEWAY_API_KEY:-}
      # Agent Runtime (daimon) — AGNOS system service
      AGNOS_AGENT_REGISTRATION_ENABLED: ${AGNOS_AGENT_REGISTRATION_ENABLED:-true}
      AGNOS_AGENT_REGISTRY_URL: ${AGNOS_AGENT_REGISTRY_URL:-http://localhost:8090}
      AGNOS_AGENT_API_KEY: ${AGNOS_AGENT_API_KEY:-}
      AGNOS_HEARTBEAT_INTERVAL_SECONDS: "30"
      AGNOS_PATH_PREFIX: "/v1"
      # Audit + dashboard + reasoning (daimon)
      AGNOS_AUDIT_ENABLED: ${AGNOS_AUDIT_ENABLED:-true}
      AGNOS_AUDIT_URL: ${AGNOS_AUDIT_URL:-http://localhost:8090}
      AGNOS_DASHBOARD_BRIDGE_ENABLED: ${AGNOS_DASHBOARD_BRIDGE_ENABLED:-true}
      AGNOS_DASHBOARD_URL: ${AGNOS_DASHBOARD_URL:-http://localhost:8090}
      AGNOS_REASONING_ENABLED: ${AGNOS_REASONING_ENABLED:-true}
      AGNOS_REASONING_URL: ${AGNOS_REASONING_URL:-http://localhost:8090}
      # Token budget (hoosh)
      AGNOS_TOKEN_BUDGET_ENABLED: ${AGNOS_TOKEN_BUDGET_ENABLED:-true}
      AGNOS_TOKEN_BUDGET_URL: ${AGNOS_TOKEN_BUDGET_URL:-http://localhost:8088}
      AGNOS_TOKEN_BUDGET_POOL: ${AGNOS_TOKEN_BUDGET_POOL:-agnostic-qa}
      AGNOS_PROFILE: ${AGNOS_PROFILE:-}
      # Backend selection: "crewai" or "agnosai"
      AGNOSTIC_BACKEND: ${AGNOSTIC_BACKEND:-crewai}
      AGNOSAI_URL: ${AGNOSAI_URL:-http://agnosai-server:8080}
      AGNOSAI_API_KEY: ${AGNOSAI_API_KEY:-}
    networks:
      - qa-network
    volumes:
      - ./agents:/app/agents
      - ./config:/app/config
      - ./logs:/app/logs
      - ./certs:/app/certs:ro
      - agnostic_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # AgnosAI Rust server (--profile agnosai or --profile e2e)
  # ---------------------------------------------------------------------------
  agnosai-server:
    image: agnosai:latest
    build:
      context: ../agnosai
      dockerfile: Dockerfile
    profiles: ["agnosai", "e2e"]
    ports:
      - "8080:8080"
    networks:
      - qa-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Dev infrastructure (--profile dev)
  # Separate containers for isolated development and testing.
  # Override REDIS_URL and DATABASE_URL to point at these services.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    profiles: ["dev"]
    ports:
      - "6379:6379"
    networks:
      - qa-network
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    profiles: ["dev"]
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agnostic}
      POSTGRES_USER: ${POSTGRES_USER:-agnostic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    networks:
      - qa-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agnostic}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  qa-network:
    driver: bridge

volumes:
  agnostic_data:
  redis_data:
  postgres_data:
