# Agnostic QA Platform
#
# Production: Agnostic runs ON AGNOS. hoosh, daimon, redis, postgres are
#             AGNOS system services. Only the webgui container is needed.
#
#   docker compose up -d
#
# Dev:        Spin up AGNOS + infra in containers to simulate the host.
#
#   docker compose --profile dev up -d
#
# Workers:    Distributed agent workers (requires rabbitmq).
#
#   docker compose --profile dev --profile workers up -d

x-agnos-env: &agnos-env
  # LLM Gateway (hoosh :8088) — all LLM traffic routes through AGNOS
  AGNOS_LLM_GATEWAY_ENABLED: "true"
  AGNOS_LLM_GATEWAY_URL: ${AGNOS_LLM_GATEWAY_URL:-http://agnos:8088}
  AGNOS_LLM_GATEWAY_MODEL: ${AGNOS_LLM_GATEWAY_MODEL:-default}
  AGNOS_LLM_GATEWAY_API_KEY: ${AGNOS_LLM_GATEWAY_API_KEY:-}
  # Agent Runtime (daimon :8090) — register + heartbeat
  AGNOS_AGENT_REGISTRATION_ENABLED: "true"
  AGNOS_AGENT_REGISTRY_URL: ${AGNOS_AGENT_REGISTRY_URL:-http://agnos:8090}
  AGNOS_AGENT_API_KEY: ${AGNOS_AGENT_API_KEY:-}
  AGNOS_HEARTBEAT_INTERVAL_SECONDS: "30"
  # Path prefix for AGNOS REST APIs
  AGNOS_PATH_PREFIX: "/v1"
  # Audit + dashboard + reasoning (all via daimon on :8090)
  AGNOS_AUDIT_ENABLED: "true"
  AGNOS_AUDIT_URL: ${AGNOS_AUDIT_URL:-http://agnos:8090}
  AGNOS_DASHBOARD_BRIDGE_ENABLED: "true"
  AGNOS_DASHBOARD_URL: ${AGNOS_DASHBOARD_URL:-http://agnos:8090}
  AGNOS_REASONING_ENABLED: "true"
  AGNOS_REASONING_URL: ${AGNOS_REASONING_URL:-http://agnos:8090}
  # Token budget (via hoosh on :8088)
  AGNOS_TOKEN_BUDGET_ENABLED: "true"
  AGNOS_TOKEN_BUDGET_URL: ${AGNOS_TOKEN_BUDGET_URL:-http://agnos:8088}
  AGNOS_TOKEN_BUDGET_POOL: ${AGNOS_TOKEN_BUDGET_POOL:-agnostic-qa}
  # Environment profile
  AGNOS_PROFILE: ${AGNOS_PROFILE:-}

x-worker-common: &worker-common
  image: agnostic:latest
  entrypoint: ["/app/agent-entrypoint.sh"]
  restart: unless-stopped
  profiles: ["workers"]
  networks:
    - qa-network
  environment: &worker-env
    REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
    <<: *agnos-env
  depends_on:
    - rabbitmq
  volumes:
    - ./logs:/app/logs
  logging: &default-logging
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  deploy: &worker-deploy
    resources:
      limits:
        memory: 2G
        cpus: '1.5'
      reservations:
        memory: 1G
        cpus: '0.75'
  healthcheck:
    test: ["CMD", "python", "-c", "import redis; r = redis.Redis.from_url('${REDIS_URL:-redis://redis:6379/0}'); r.ping()"]
    interval: 30s
    timeout: 10s
    retries: 3

services:
  # ---------------------------------------------------------------------------
  # Agnostic (always started)
  # ---------------------------------------------------------------------------
  webgui:
    image: agnostic:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AGNOSTIC_API_KEY: ${AGNOSTIC_API_KEY:-}
      YEOMAN_A2A_ENABLED: ${YEOMAN_A2A_ENABLED:-true}
      MCP_SERVER_ENABLED: ${MCP_SERVER_ENABLED:-true}
      WEBGUI_HOST: "0.0.0.0"
      WEBGUI_PORT: "8000"
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-agnostic}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agnostic}}
      DATABASE_ENABLED: ${DATABASE_ENABLED:-false}
      <<: *agnos-env
    networks:
      - qa-network
    volumes:
      - ./agents:/app/agents
      - ./config:/app/config
      - ./logs:/app/logs
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Dev dependencies (--profile dev)
  # On AGNOS these are system services; in dev we containerize them.
  # ---------------------------------------------------------------------------
  agnos:
    image: ${AGNOS_IMAGE:-agnos:latest}
    profiles: ["dev"]
    ports:
      - "${HOOSH_PORT:-8088}:8088"
      - "${DAIMON_PORT:-8090}:8090"
    environment:
      RUST_LOG: ${LOG_LEVEL:-info}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    networks:
      - qa-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    profiles: ["dev"]
    ports:
      - "6379:6379"
    networks:
      - qa-network
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    profiles: ["dev"]
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agnostic}
      POSTGRES_USER: ${POSTGRES_USER:-agnostic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    networks:
      - qa-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agnostic}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Workers (--profile workers)
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    profiles: ["workers"]
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    networks:
      - qa-network
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  qa-manager:
    <<: *worker-common
    environment:
      <<: *worker-env
      AGENT_ROLE: manager

  senior-qa:
    <<: *worker-common
    environment:
      <<: *worker-env
      AGENT_ROLE: senior
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '2.0'
        reservations:
          memory: 1.5G
          cpus: '1.0'

  junior-qa:
    <<: *worker-common
    environment:
      <<: *worker-env
      AGENT_ROLE: junior

  qa-analyst:
    <<: *worker-common
    environment:
      <<: *worker-env
      AGENT_ROLE: analyst

  security-compliance-agent:
    <<: *worker-common
    environment:
      <<: *worker-env
      AGENT_ROLE: security_compliance

  performance-agent:
    <<: *worker-common
    environment:
      <<: *worker-env
      AGENT_ROLE: performance
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '2.0'
        reservations:
          memory: 1.5G
          cpus: '1.0'

networks:
  qa-network:
    driver: bridge

volumes:
  redis_data:
  rabbitmq_data:
  postgres_data:
