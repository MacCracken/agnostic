# Agnostic QA Platform
#
# Default:  docker compose up -d
#           Starts webgui + redis + postgres (3 containers).
#           Agents run in-process inside webgui.
#
# Workers:  docker compose --profile workers up -d
#           Also starts 6 agent Celery workers + rabbitmq for distributed mode.
#
# Overrides:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile workers up -d
#   docker compose -f docker-compose.yml -f docker-compose.tls.yml up -d

x-worker-common: &worker-common
  image: agnostic-agent:latest
  restart: unless-stopped
  profiles: ["workers"]
  networks:
    - qa-network
  environment: &worker-env
    REDIS_URL: redis://redis:6379/0
    RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
    OPENAI_API_KEY: ${OPENAI_API_KEY}
  depends_on:
    - redis
    - rabbitmq
  volumes: &worker-volumes
    - ./logs:/app/logs
  logging: &default-logging
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  deploy: &worker-deploy
    resources:
      limits:
        memory: 2G
        cpus: '1.5'
      reservations:
        memory: 1G
        cpus: '0.75'
  healthcheck:
    test: ["CMD", "python", "-c", "import redis; r = redis.Redis(host='redis', port=6379); r.ping()"]
    interval: 30s
    timeout: 10s
    retries: 3

services:
  # ---------------------------------------------------------------------------
  # Core (always started)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - qa-network
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agnostic}
      POSTGRES_USER: ${POSTGRES_USER:-agnostic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    networks:
      - qa-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agnostic}"]
      interval: 10s
      timeout: 5s
      retries: 5

  webgui:
    build:
      context: .
      dockerfile: webgui/Dockerfile
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AGNOSTIC_API_KEY: ${AGNOSTIC_API_KEY:-}
      WEBGUI_HOST: "0.0.0.0"
      WEBGUI_PORT: "8000"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agnostic}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agnostic}
      DATABASE_ENABLED: ${DATABASE_ENABLED:-false}
    depends_on:
      - redis
      - postgres
    networks:
      - qa-network
    volumes:
      - ./agents:/app/agents
      - ./config:/app/config
      - ./logs:/app/logs
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Workers (--profile workers)
  # All use the same docker/Dockerfile.agent image, differentiated by AGENT_ROLE.
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    profiles: ["workers"]
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    networks:
      - qa-network
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped

  qa-manager:
    <<: *worker-common
    environment:
      <<: *worker-env
      AGENT_ROLE: manager
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'

  senior-qa:
    <<: *worker-common
    environment:
      <<: *worker-env
      AGENT_ROLE: senior
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '2.0'
        reservations:
          memory: 1.5G
          cpus: '1.0'

  junior-qa:
    <<: *worker-common
    environment:
      <<: *worker-env
      AGENT_ROLE: junior

  qa-analyst:
    <<: *worker-common
    environment:
      <<: *worker-env
      AGENT_ROLE: analyst

  security-compliance-agent:
    <<: *worker-common
    environment:
      <<: *worker-env
      AGENT_ROLE: security_compliance

  performance-agent:
    <<: *worker-common
    environment:
      <<: *worker-env
      AGENT_ROLE: performance
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '2.0'
        reservations:
          memory: 1.5G
          cpus: '1.0'

networks:
  qa-network:
    driver: bridge

volumes:
  redis_data:
  rabbitmq_data:
  postgres_data:
