# TLS override — switches Redis/RabbitMQ to encrypted connections, adds cert volumes.
# Usage: docker compose -f docker-compose.yml -f docker-compose.tls.yml up -d
# With workers: docker compose -f docker-compose.yml -f docker-compose.tls.yml --profile workers up -d

x-tls-env: &tls-env
  REDIS_URL: rediss://redis:6380/0
  REDIS_CA_CERT: /certs/ca.pem
  RABBITMQ_URL: amqps://${RABBITMQ_USER:?}:${RABBITMQ_PASSWORD:?}@rabbitmq:5673/
  RABBITMQ_CA_CERT: /certs/ca.pem

services:
  redis:
    ports:
      - "6379:6379"
      - "6380:6380"
    volumes:
      - redis_data:/data
      - ./certs:/certs:ro
    command: >
      --port 6379
      --tls-port 6380
      --tls-cert-file /certs/redis.pem
      --tls-key-file /certs/redis-key.pem
      --tls-ca-cert-file /certs/ca.pem
      --tls-auth-clients no

  rabbitmq:
    ports:
      - "5672:5672"
      - "5673:5673"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./certs:/certs:ro
      - ./tls/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro

  webgui:
    ports:
      - "8000:8000"
      - "8443:8443"
    environment:
      <<: *tls-env
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      WEBGUI_HOST: "0.0.0.0"
      WEBGUI_PORT: "8000"
      WEBGUI_TLS_PORT: "8443"
      WEBGUI_CERT_FILE: /certs/webgui.pem
      WEBGUI_KEY_FILE: /certs/webgui-key.pem
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agnostic}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agnostic}
      DATABASE_ENABLED: ${DATABASE_ENABLED:-false}
    volumes:
      - ./agents:/app/agents
      - ./config:/app/config
      - ./logs:/app/logs
      - ./certs:/certs:ro

  qa-manager:
    environment:
      <<: *tls-env
      AGENT_ROLE: manager
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./agents:/app/agents
      - ./config:/app/config
      - ./logs:/app/logs
      - ./certs:/certs:ro

  senior-qa:
    environment:
      <<: *tls-env
      AGENT_ROLE: senior
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./agents:/app/agents
      - ./config:/app/config
      - ./logs:/app/logs
      - ./certs:/certs:ro

  junior-qa:
    environment:
      <<: *tls-env
      AGENT_ROLE: junior
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./agents:/app/agents
      - ./config:/app/config
      - ./examples:/app/examples
      - ./logs:/app/logs
      - ./certs:/certs:ro

  qa-analyst:
    environment:
      <<: *tls-env
      AGENT_ROLE: analyst
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./agents:/app/agents
      - ./config:/app/config
      - ./logs:/app/logs
      - ./certs:/certs:ro

  security-compliance-agent:
    environment:
      <<: *tls-env
      AGENT_ROLE: security_compliance
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./agents:/app/agents
      - ./config:/app/config
      - ./logs:/app/logs
      - ./certs:/certs:ro

  performance-agent:
    environment:
      <<: *tls-env
      AGENT_ROLE: performance
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./agents:/app/agents
      - ./config:/app/config
      - ./logs:/app/logs
      - ./certs:/certs:ro
