---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault
  namespace: external-secrets
spec:
  provider:
    vault:
      server: "https://vault.example.com:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: kubernetes
          role: agentic-qa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: agentic-qa-secrets
  namespace: agentic-qa
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: qa-secrets
    creationPolicy: Owner
  data:
  - secretKey: OPENAI_API_KEY
    remoteRef:
      key: agentic-qa/openai
      property: api_key
  - secretKey: RABBITMQ_PASSWORD
    remoteRef:
      key: agentic-qa/rabbitmq
      property: password
  - secretKey: REDIS_PASSWORD
    remoteRef:
      key: agentic-qa/redis
      property: password
  - secretKey: AGNOSTIC_API_KEY
    remoteRef:
      key: agentic-qa/api-keys
      property: agnostic
  - secretKey: WEBHOOK_SECRET
    remoteRef:
      key: agentic-qa/webhooks
      property: secret
