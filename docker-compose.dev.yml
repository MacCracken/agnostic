# Development overrides — security hardening and debug settings.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

x-dev-security: &dev-security
  security_opt:
    - no-new-privileges:true
  read_only: true
  tmpfs:
    - /tmp

services:
  redis:
    <<: *dev-security
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  webgui:
    <<: *dev-security
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      WEBGUI_HOST: "0.0.0.0"
      WEBGUI_PORT: "8000"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agnostic}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agnostic}
      DATABASE_ENABLED: ${DATABASE_ENABLED:-false}
      LOG_LEVEL: DEBUG
